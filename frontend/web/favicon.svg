<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
    <radialGradient id="g" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
  </defs>

  <!-- Ball base -->
  <circle cx="32" cy="32" r="30" fill="url(#g)" stroke="#555" stroke-width="1.5"/>

  <!-- Black patches clipped to ball shape -->
  <g clip-path="url(#c)" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="0.5" stroke-linejoin="round">
    <!-- Center top pentagon -->
    <polygon points="32,5 45.5,15 40.5,30 23.5,30 18.5,15"/>
    <!-- Top-right pentagon (partial) -->
    <polygon points="45.5,15 59,5 66,20 56,31 40.5,30"/>
    <!-- Right pentagon (partial) -->
    <polygon points="56,31 66,20 66,44 57,52 45,43"/>
    <!-- Bottom-right pentagon (partial) -->
    <polygon points="45,43 57,52 51,64 37,64 32,53"/>
    <!-- Bottom-left pentagon (partial) -->
    <polygon points="32,53 19,64 9,56 10,42 24,43"/>
    <!-- Left pentagon (partial) -->
    <polygon points="24,43 10,42 2,30 8,19 23.5,30"/>
    <!-- Top-left pentagon (partial) -->
    <polygon points="18.5,15 8,19 2,5 15,0 32,5"/>
  </g>

  <!-- Ball outline -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#555" stroke-width="1.5"/>
</svg>
