<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3a3d42"/>
      <stop offset="100%" stop-color="#1a1c1f"/>
    </radialGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#39ff14" stroke-width="1.2" opacity="0.5"/>

  <!-- Ball base -->
  <circle cx="32" cy="32" r="28" fill="url(#bg)" stroke="#39ff14" stroke-width="1.8"/>

  <!-- Neon green patches clipped to ball -->
  <g clip-path="url(#c)" fill="#39ff14" fill-opacity="0.18" stroke="#39ff14" stroke-width="1" stroke-linejoin="round" stroke-opacity="0.7">
    <!-- Center top pentagon -->
    <polygon points="32,6 44,15 39,28 25,28 20,15"/>
    <!-- Top-right -->
    <polygon points="44,15 56,7 62,21 53,31 39,28"/>
    <!-- Right -->
    <polygon points="53,31 62,21 62,43 54,51 43,42"/>
    <!-- Bottom-right -->
    <polygon points="43,42 54,51 48,62 35,62 32,52"/>
    <!-- Bottom-left -->
    <polygon points="32,52 20,62 14,53 16,41 27,42"/>
    <!-- Left -->
    <polygon points="27,42 16,41 2,30 9,19 25,28"/>
    <!-- Top-left -->
    <polygon points="20,15 9,19 3,7 16,2 32,6"/>
  </g>

  <!-- Ball outline -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#39ff14" stroke-width="1.8"/>
</svg>
